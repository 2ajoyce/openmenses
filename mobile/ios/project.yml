name: OpenMenses

options:
  deploymentTarget:
    iOS: "16.0"
  xcodeVersion: "16.0"
  createIntermediateGroups: true

targets:
  OpenMenses:
    type: application
    platform: iOS
    deploymentTarget: "16.0"
    # Swift source files in OpenMenses/. xcodegen auto-routes each file type:
    # .swift → Compile Sources, .storyboard/.xcassets → Copy Bundle Resources,
    # Info.plist → referenced via INFOPLIST_FILE build setting (not compiled).
    sources:
      - path: OpenMenses
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.2ajoyce.openmenses
        # 1 = iPhone, 2 = iPad (both supported)
        TARGETED_DEVICE_FAMILY: "1,2"
        SWIFT_VERSION: "5.0"
        INFOPLIST_FILE: OpenMenses/Info.plist
        # Disable Xcode 13+ auto-generated plist — we provide our own.
        GENERATE_INFOPLIST_FILE: NO
        # IMPORTANT: these must be kept in sync manually.
        # - MARKETING_VERSION: bump here before running `make mobile-project` when releasing.
        #   Xcode Cloud does NOT manage this — omitting it causes Xcode to default to "1.0".
        # - CURRENT_PROJECT_VERSION: Xcode Cloud's "Increment Build Number" action overwrites
        #   this during CI. The value here is only a local baseline; keep it at the last known
        #   build number so local builds aren't lower than the last CI build.
        MARKETING_VERSION: "1.8"
        CURRENT_PROJECT_VERSION: "15"
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        DEVELOPMENT_TEAM: "79AKRQK9LV"
        CODE_SIGN_STYLE: Automatic
        ENABLE_HARDENED_RUNTIME: YES
        CODE_SIGN_ENTITLEMENTS: OpenMenses/OpenMenses.entitlements
        # The "Copy UI Assets" build phase reads ui/dist from the repo root,
        # which is outside the Xcode build sandbox. Sandboxing must be off.
        ENABLE_USER_SCRIPT_SANDBOXING: NO
        INFOPLIST_KEY_LSApplicationCategoryType: "public.app-category.health-and-fitness"
    dependencies:
      # Engine.xcframework is a static archive (ar) produced by `gomobile bind`.
      # Static frameworks are merged into the main binary at link time — they
      # must NOT be embedded in the app bundle (embed: false).
      - framework: Engine.xcframework
        embed: false
      # HealthKit system framework for menstrual flow read/write (Phase 7D).
      - sdk: HealthKit.framework
    preBuildScripts:
      # Build Engine.xcframework via gomobile bind before the compile/link phase.
      # The framework is a linked dependency so it must exist before Xcode
      # compiles Swift sources. A staleness check avoids rebuilding on every
      # build — only rebuilds when Go source files are newer than the framework.
      # Requires: gomobile installed (run `make mobile-setup` once).
      - script: |
          REPO_ROOT="${SRCROOT}/../.."
          FRAMEWORK="${SRCROOT}/Engine.xcframework"

          # Xcode's shell has a minimal PATH — add Homebrew paths first so `go`
          # is available, then resolve GOPATH to find gomobile.
          export PATH="/opt/homebrew/bin:/usr/local/bin:${PATH}"
          if command -v go &>/dev/null; then
            export PATH="$(go env GOPATH)/bin:${PATH}"
          fi

          # Verify gomobile is available.
          if ! command -v gomobile &>/dev/null; then
            echo "error: gomobile not found. Run 'make mobile-setup' from the repo root first."
            exit 1
          fi

          # If the framework doesn't exist at all, build it unconditionally.
          if [ ! -d "${FRAMEWORK}" ]; then
            echo "note: Engine.xcframework not found — building..."
            make -C "${REPO_ROOT}" mobile-ios
            exit $?
          fi

          # Staleness check: rebuild only if any Go source file under engine/
          # is newer than the framework's Info.plist (build marker).
          MARKER="${FRAMEWORK}/Info.plist"
          STALE=$(find "${REPO_ROOT}/engine" -name '*.go' -newer "${MARKER}" -print -quit)
          if [ -n "${STALE}" ]; then
            echo "note: Engine source changed — rebuilding Engine.xcframework..."
            make -C "${REPO_ROOT}" mobile-ios
          else
            echo "note: Engine.xcframework is up to date."
          fi
        name: "Build Engine Framework"
        basedOnDependencyAnalysis: false
    postBuildScripts:
      # Always build the Vite production bundle and copy it into the app bundle
      # so the Go engine can serve the UI from its local HTTP server.
      # In both Xcode Cloud and local builds, ui-bundle is always re-run so
      # UI source changes are always reflected without a manual `make ui-bundle`.
      - script: |
          REPO_ROOT="${SRCROOT}/../.."
          UI_DIST="${REPO_ROOT}/ui/dist"
          UI_DEST="${TARGET_BUILD_DIR}/${UNLOCALIZED_RESOURCES_FOLDER_PATH}/ui"

          # Extend PATH so npm/node installed via Homebrew (Apple Silicon and Intel) are found.
          export PATH="/opt/homebrew/bin:/usr/local/bin:${PATH}"

          # Always rebuild the UI bundle so local Xcode builds pick up the latest
          # source changes. (In Xcode Cloud, ci_post_clone.sh pre-builds ui/dist
          # on a fresh clone, so this is fast there too.)
          echo "note: running make ui-bundle..."
          make -C "${REPO_ROOT}" ui-bundle

          if [ -d "${UI_DIST}" ]; then
            rm -rf "${UI_DEST}"
            mkdir -p "${UI_DEST}"
            cp -R "${UI_DIST}/." "${UI_DEST}/"
            echo "note: Copied UI assets from ${UI_DIST}"
          else
            echo "error: UI assets not found at ${UI_DIST}. Run 'make ui-bundle' from the repo root and rebuild."
            exit 1
          fi
        name: "Copy UI Assets"
        # Always run this phase — the output directory is not tracked by Xcode's
        # build system, so dependency analysis would skip it incorrectly.
        basedOnDependencyAnalysis: false
