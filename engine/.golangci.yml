# .golangci.yml — golangci-lint configuration for the openmenses engine
# See: https://golangci-lint.run/usage/configuration/

version: "2"

run:
  timeout: 5m
  # Run from the engine/ directory
  modules-download-mode: readonly

linters:
  enable:
    - errcheck # Check for unchecked errors
    - govet # Go vet checks
    - ineffassign # Detect ineffectual assignments
    - staticcheck # Static analysis (includes gosimple rules)
    - unused # Detect unused code
    - misspell # Catch common misspellings
    - godot # Require comments to end with a period
    - nilerr # Find incorrect nil error returns

formatters:
  enable:
    - gofmt
    - goimports

linters-settings:
  gofmt:
    simplify: true
  goimports:
    local-prefixes: github.com/2ajoyce/openmenses

issues:
  # Don't report issues in generated code
  exclude-rules:
    - path: "../gen/"
      linters:
        - all
  max-issues-per-linter: 0
  max-same-issues: 0
