# buf.yaml — Buf configuration for openmenses proto files
# See: https://buf.build/docs/configuration/v2/buf-yaml

version: v2

modules:
  - path: proto

deps:
  - buf.build/bufbuild/protovalidate

lint:
  use:
    - STANDARD
  # Enforce package version suffixes (e.g., openmenses.v1)
  except: []

breaking:
  use:
    - FILE
