syntax = "proto3";

package openmenses.v1;

import "buf/validate/validate.proto";

option go_package = "github.com/2ajoyce/openmenses/gen/go/openmenses/v1;openmensesv1";

message LocalDate {
  string value = 1 [(buf.validate.field).string = {
    pattern: "^[0-9]{4}-[0-9]{2}-[0-9]{2}$"
    len: 10
  }];
}

message DateTime {
  string value = 1 [(buf.validate.field).string = {
    min_len: 20
    max_len: 64
  }];
}

message RecordRef {
  string id = 1 [
    (buf.validate.field).string.min_len = 1,
    (buf.validate.field).string.max_len = 128
  ];
}

message DateRange {
  LocalDate start = 1;
  LocalDate end = 2;
}

message DateTimeRange {
  DateTime start = 1;
  DateTime end = 2;
}

message PaginationRequest {
  uint32 page_size = 1 [(buf.validate.field).uint32.lte = 500];
  string page_token = 2 [(buf.validate.field).string.max_len = 512];
}

message PaginationResponse {
  string next_page_token = 1 [(buf.validate.field).string.max_len = 512];
}

enum TimelineRecordType {
  TIMELINE_RECORD_TYPE_UNSPECIFIED = 0;
  TIMELINE_RECORD_TYPE_BLEEDING_OBSERVATION = 1;
  TIMELINE_RECORD_TYPE_SYMPTOM_OBSERVATION = 2;
  TIMELINE_RECORD_TYPE_MOOD_OBSERVATION = 3;
  TIMELINE_RECORD_TYPE_MEDICATION = 4;
  TIMELINE_RECORD_TYPE_MEDICATION_EVENT = 5;
  TIMELINE_RECORD_TYPE_CYCLE = 6;
  TIMELINE_RECORD_TYPE_PHASE_ESTIMATE = 7;
  TIMELINE_RECORD_TYPE_PREDICTION = 8;
  TIMELINE_RECORD_TYPE_INSIGHT = 9;
}
