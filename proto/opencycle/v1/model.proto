syntax = "proto3";

package opencycle.v1;

import "buf/validate/validate.proto";
import "opencycle/v1/types.proto";

option go_package = "github.com/2ajoyce/opencycle/gen/go/opencycle/v1;opencyclev1";

message UserProfile {
  string id = 1 [(buf.validate.field).string = {
    min_len: 1
    max_len: 128
  }];
  BiologicalCycleModel biological_cycle = 2 [(buf.validate.field).enum = {
    defined_only: true
    not_in: [0]
  }];
  ContraceptionType contraception = 3 [(buf.validate.field).enum = {
    defined_only: true
    not_in: [0]
  }];
  CycleRegularity cycle_regularity = 4 [(buf.validate.field).enum = {
    defined_only: true
    not_in: [0]
  }];
  ReproductiveGoal reproductive_goal = 5 [(buf.validate.field).enum = {
    defined_only: true
    not_in: [0]
  }];
  repeated HealthCondition health_conditions = 6 [(buf.validate.field).repeated.unique = true];
  repeated TrackingFocus tracking_focus = 7 [(buf.validate.field).repeated = {
    min_items: 1
    unique: true
  }];
}

message BleedingObservation {
  string id = 1 [(buf.validate.field).string.min_len = 1];
  string user_id = 2 [(buf.validate.field).string.min_len = 1];
  DateTime timestamp = 3;
  BleedingFlow flow = 4 [(buf.validate.field).enum = {
    defined_only: true
    not_in: [0]
  }];
  string note = 5 [(buf.validate.field).string.max_len = 1024];
}

message SymptomObservation {
  string id = 1 [(buf.validate.field).string.min_len = 1];
  string user_id = 2 [(buf.validate.field).string.min_len = 1];
  DateTime timestamp = 3;
  SymptomType symptom = 4 [(buf.validate.field).enum = {
    defined_only: true
    not_in: [0]
  }];
  SymptomSeverity severity = 5 [(buf.validate.field).enum.defined_only = true];
  string note = 6 [(buf.validate.field).string.max_len = 1024];
}

message MoodObservation {
  string id = 1 [(buf.validate.field).string.min_len = 1];
  string user_id = 2 [(buf.validate.field).string.min_len = 1];
  DateTime timestamp = 3;
  MoodType mood = 4 [(buf.validate.field).enum = {
    defined_only: true
    not_in: [0]
  }];
  MoodIntensity intensity = 5 [(buf.validate.field).enum.defined_only = true];
  string note = 6 [(buf.validate.field).string.max_len = 1024];
}

message Medication {
  string id = 1 [(buf.validate.field).string.min_len = 1];
  string user_id = 2 [(buf.validate.field).string.min_len = 1];
  string name = 3 [(buf.validate.field).string = {
    min_len: 1
    max_len: 256
  }];
  MedicationCategory category = 4 [(buf.validate.field).enum = {
    defined_only: true
    not_in: [0]
  }];
  bool active = 5;
  string note = 6 [(buf.validate.field).string.max_len = 1024];
}

message MedicationEvent {
  string id = 1 [(buf.validate.field).string.min_len = 1];
  string user_id = 2 [(buf.validate.field).string.min_len = 1];
  string medication_id = 3 [(buf.validate.field).string.min_len = 1];
  DateTime timestamp = 4;
  MedicationEventStatus status = 5 [(buf.validate.field).enum = {
    defined_only: true
    not_in: [0]
  }];
  string dose = 6 [(buf.validate.field).string.max_len = 64];
  string note = 7 [(buf.validate.field).string.max_len = 1024];
}

message Cycle {
  string id = 1 [(buf.validate.field).string.min_len = 1];
  string user_id = 2 [(buf.validate.field).string.min_len = 1];
  LocalDate start_date = 3;
  LocalDate end_date = 4;
  CycleSource source = 5 [(buf.validate.field).enum.defined_only = true];
}

message PhaseEstimate {
  string id = 1 [(buf.validate.field).string.min_len = 1];
  string user_id = 2 [(buf.validate.field).string.min_len = 1];
  LocalDate date = 3;
  CyclePhase phase = 4 [(buf.validate.field).enum.defined_only = true];
  ConfidenceLevel confidence = 5 [(buf.validate.field).enum.defined_only = true];
  repeated RecordRef based_on_record_refs = 6;
}

message Prediction {
  string id = 1 [(buf.validate.field).string.min_len = 1];
  string user_id = 2 [(buf.validate.field).string.min_len = 1];
  PredictionType kind = 3 [(buf.validate.field).enum = {
    defined_only: true
    not_in: [0]
  }];
  LocalDate predicted_start_date = 4;
  LocalDate predicted_end_date = 5;
  ConfidenceLevel confidence = 6 [(buf.validate.field).enum.defined_only = true];
  repeated string rationale = 7 [(buf.validate.field).repeated.max_items = 16];
}

message Insight {
  string id = 1 [(buf.validate.field).string.min_len = 1];
  string user_id = 2 [(buf.validate.field).string.min_len = 1];
  InsightType kind = 3 [(buf.validate.field).enum = {
    defined_only: true
    not_in: [0]
  }];
  string summary = 4 [(buf.validate.field).string = {
    min_len: 1
    max_len: 2048
  }];
  repeated RecordRef evidence_record_refs = 5;
  ConfidenceLevel confidence = 6 [(buf.validate.field).enum.defined_only = true];
}

enum BiologicalCycleModel {
  BIOLOGICAL_CYCLE_MODEL_UNSPECIFIED = 0;
  BIOLOGICAL_CYCLE_MODEL_OVULATORY = 1;
  BIOLOGICAL_CYCLE_MODEL_HORMONALLY_SUPPRESSED = 2;
  BIOLOGICAL_CYCLE_MODEL_IRREGULAR = 3;
}
enum ContraceptionType {
  CONTRACEPTION_TYPE_UNSPECIFIED = 0;
  CONTRACEPTION_TYPE_NONE = 1;
  CONTRACEPTION_TYPE_BARRIER = 2;
  CONTRACEPTION_TYPE_HORMONAL_PILL = 3;
  CONTRACEPTION_TYPE_HORMONAL_PATCH = 4;
  CONTRACEPTION_TYPE_HORMONAL_RING = 5;
  CONTRACEPTION_TYPE_HORMONAL_SHOT = 6;
  CONTRACEPTION_TYPE_HORMONAL_IMPLANT = 7;
  CONTRACEPTION_TYPE_HORMONAL_IUD = 8;
  CONTRACEPTION_TYPE_COPPER_IUD = 9;
  CONTRACEPTION_TYPE_OTHER = 10;
}
enum CycleRegularity {
  CYCLE_REGULARITY_UNSPECIFIED = 0;
  CYCLE_REGULARITY_REGULAR = 1;
  CYCLE_REGULARITY_SOMEWHAT_IRREGULAR = 2;
  CYCLE_REGULARITY_VERY_IRREGULAR = 3;
  CYCLE_REGULARITY_UNKNOWN = 4;
}
enum ReproductiveGoal {
  REPRODUCTIVE_GOAL_UNSPECIFIED = 0;
  REPRODUCTIVE_GOAL_TRYING_TO_CONCEIVE = 1;
  REPRODUCTIVE_GOAL_AVOID_PREGNANCY = 2;
  REPRODUCTIVE_GOAL_PREGNANCY_IRRELEVANT = 3;
  REPRODUCTIVE_GOAL_NOT_TRACKING_FERTILITY = 4;
}
enum HealthCondition {
  HEALTH_CONDITION_UNSPECIFIED = 0;
  HEALTH_CONDITION_PCOS = 1;
  HEALTH_CONDITION_ENDOMETRIOSIS = 2;
  HEALTH_CONDITION_ADENOMYOSIS = 3;
  HEALTH_CONDITION_PMDD = 4;
  HEALTH_CONDITION_MENSTRUAL_MIGRAINE = 5;
  HEALTH_CONDITION_THYROID_DISORDER = 6;
  HEALTH_CONDITION_PERIMENOPAUSE = 7;
  HEALTH_CONDITION_OTHER = 8;
}
enum TrackingFocus {
  TRACKING_FOCUS_UNSPECIFIED = 0;
  TRACKING_FOCUS_BLEEDING = 1;
  TRACKING_FOCUS_SYMPTOMS = 2;
  TRACKING_FOCUS_MOOD = 3;
  TRACKING_FOCUS_MEDICATION = 4;
  TRACKING_FOCUS_CYCLE_PREDICTION = 5;
  TRACKING_FOCUS_PATTERN_ANALYSIS = 6;
}
enum BleedingFlow {
  BLEEDING_FLOW_UNSPECIFIED = 0;
  BLEEDING_FLOW_SPOTTING = 1;
  BLEEDING_FLOW_LIGHT = 2;
  BLEEDING_FLOW_MEDIUM = 3;
  BLEEDING_FLOW_HEAVY = 4;
}
enum SymptomType {
  SYMPTOM_TYPE_UNSPECIFIED = 0;
  SYMPTOM_TYPE_CRAMPS = 1;
  SYMPTOM_TYPE_HEADACHE = 2;
  SYMPTOM_TYPE_MIGRAINE = 3;
  SYMPTOM_TYPE_BLOATING = 4;
  SYMPTOM_TYPE_BREAST_TENDERNESS = 5;
  SYMPTOM_TYPE_FATIGUE = 6;
  SYMPTOM_TYPE_NAUSEA = 7;
  SYMPTOM_TYPE_ACNE = 8;
  SYMPTOM_TYPE_BACK_PAIN = 9;
  SYMPTOM_TYPE_OTHER = 10;
}
enum SymptomSeverity {
  SYMPTOM_SEVERITY_UNSPECIFIED = 0;
  SYMPTOM_SEVERITY_MINIMAL = 1;
  SYMPTOM_SEVERITY_MILD = 2;
  SYMPTOM_SEVERITY_MODERATE = 3;
  SYMPTOM_SEVERITY_SEVERE = 4;
}
enum MoodType {
  MOOD_TYPE_UNSPECIFIED = 0;
  MOOD_TYPE_CALM = 1;
  MOOD_TYPE_HAPPY = 2;
  MOOD_TYPE_IRRITABLE = 3;
  MOOD_TYPE_ANXIOUS = 4;
  MOOD_TYPE_SAD = 5;
  MOOD_TYPE_EMOTIONALLY_FLAT = 6;
  MOOD_TYPE_OTHER = 7;
}
enum MoodIntensity {
  MOOD_INTENSITY_UNSPECIFIED = 0;
  MOOD_INTENSITY_LOW = 1;
  MOOD_INTENSITY_MEDIUM = 2;
  MOOD_INTENSITY_HIGH = 3;
}
enum MedicationCategory {
  MEDICATION_CATEGORY_UNSPECIFIED = 0;
  MEDICATION_CATEGORY_BIRTH_CONTROL = 1;
  MEDICATION_CATEGORY_PAIN_RELIEF = 2;
  MEDICATION_CATEGORY_MIGRAINE = 3;
  MEDICATION_CATEGORY_HORMONE_THERAPY = 4;
  MEDICATION_CATEGORY_SUPPLEMENT = 5;
  MEDICATION_CATEGORY_OTHER = 6;
}
enum MedicationEventStatus {
  MEDICATION_EVENT_STATUS_UNSPECIFIED = 0;
  MEDICATION_EVENT_STATUS_TAKEN = 1;
  MEDICATION_EVENT_STATUS_MISSED = 2;
  MEDICATION_EVENT_STATUS_SKIPPED = 3;
}
enum CycleSource {
  CYCLE_SOURCE_UNSPECIFIED = 0;
  CYCLE_SOURCE_DERIVED_FROM_BLEEDING = 1;
  CYCLE_SOURCE_USER_CONFIRMED = 2;
}
enum CyclePhase {
  CYCLE_PHASE_UNSPECIFIED = 0;
  CYCLE_PHASE_MENSTRUATION = 1;
  CYCLE_PHASE_FOLLICULAR = 2;
  CYCLE_PHASE_OVULATION_WINDOW = 3;
  CYCLE_PHASE_LUTEAL = 4;
  CYCLE_PHASE_UNKNOWN = 5;
}
enum ConfidenceLevel {
  CONFIDENCE_LEVEL_UNSPECIFIED = 0;
  CONFIDENCE_LEVEL_LOW = 1;
  CONFIDENCE_LEVEL_MEDIUM = 2;
  CONFIDENCE_LEVEL_HIGH = 3;
}
enum PredictionType {
  PREDICTION_TYPE_UNSPECIFIED = 0;
  PREDICTION_TYPE_NEXT_BLEED = 1;
  PREDICTION_TYPE_PMS_WINDOW = 2;
  PREDICTION_TYPE_OVULATION_WINDOW = 3;
  PREDICTION_TYPE_SYMPTOM_WINDOW = 4;
}
enum InsightType {
  INSIGHT_TYPE_UNSPECIFIED = 0;
  INSIGHT_TYPE_CYCLE_LENGTH_PATTERN = 1;
  INSIGHT_TYPE_SYMPTOM_PATTERN = 2;
  INSIGHT_TYPE_MEDICATION_ADHERENCE_PATTERN = 3;
  INSIGHT_TYPE_BLEEDING_PATTERN = 4;
}
